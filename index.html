<!DOCTYPE html>
<html>
<head>
<title>HuloTech AI Training Survey</title>
<style>
body{
font-family:Arial;
margin:40px;
background:#f5f7fb;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
color:#2b3a67;
}

label{
display:block;
margin-top:20px;
font-weight:bold;
}

textarea,input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:25px;
padding:12px 20px;
background:#2b3a67;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1c2541;
}
</style>
</head>

<body>

<div class="container">

<h1>HuloTech AI Training Survey</h1>

<p>This short survey will help us tailor the AI training session to your needs.</p>

<form>

<label>Your role</label>
<select>
<option>Executive / Manager</option>
<option>Professional</option>
<option>Technical specialist</option>
<option>Student</option>
<option>Other</option>
</select>

<label>Your sector</label>
<select>
<option>Government</option>
<option>Education</option>
<option>Private company</option>
<option>Consulting</option>
<option>Other</option>
</select>

<label>How familiar are you with AI tools?</label>
<select>
<option>Never used AI</option>
<option>Tried a few times</option>
<option>Occasional use</option>
<option>Regular use</option>
<option>Daily use</option>
</select>

<label>Which AI tools have you used?</label>
<textarea placeholder="ChatGPT, Claude, Copilot, etc"></textarea>

<label>What tasks consume the most time in your work?</label>
<textarea></textarea>

<label>If you could automate one task using AI, what would it be?</label>
<textarea></textarea>

<label>Describe a problem you would like to solve with AI</label>
<textarea></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
