<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>HuloTech AI Training Survey</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
color:#1f2a44;
}

label{
display:block;
margin-top:20px;
font-weight:bold;
}

textarea,input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
margin-top:20px;
padding:12px 20px;
background:#1f2a44;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.langswitch{
float:right;
margin-bottom:10px;
}

.success{
margin-top:20px;
padding:15px;
background:#e6f4ea;
border-radius:6px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="langswitch">

<button onclick="setLang('en')">English</button>
<button onclick="setLang('fr')">Français</button>

</div>

<h1 id="title"></h1>

<p id="intro"></p>

<form id="surveyForm">

<label id="roleLabel"></label>

<select>

<option>Executive / Manager</option>
<option>Professional</option>
<option>Technical specialist</option>
<option>Researcher / Academic</option>
<option>Student</option>
<option>Other</option>

</select>


<label id="sectorLabel"></label>

<select>

<option>Government</option>
<option>Education / University</option>
<option>Private company</option>
<option>Consulting</option>
<option>Non-profit</option>
<option>Other</option>

</select>


<label id="aiLevelLabel"></label>

<select>

<option>Never used AI</option>
<option>Tried a few times</option>
<option>Occasional use</option>
<option>Regular use</option>
<option>Daily use</option>

</select>


<label id="toolsLabel"></label>

<textarea></textarea>


<label id="timeLabel"></label>

<textarea></textarea>


<label id="automationLabel"></label>

<textarea></textarea>


<label id="problemLabel"></label>

<textarea></textarea>


<button type="submit" id="submitBtn"></button>

</form>


<div class="success" id="successMessage"></div>

</div>


<script>

const translations = {

en: {

title:"HuloTech AI Training Preparation Survey",

intro:"This short survey (about 5 minutes) will help us tailor the upcoming AI training to your needs.",

role:"Your role",

sector:"Your sector",

aiLevel:"How familiar are you with AI tools?",

tools:"Which AI tools have you used?",

time:"What tasks consume the most time in your work?",

automation:"If you could automate one task using AI, what would it be?",

problem:"Describe a problem you would like to solve with AI",

submit:"Submit",

success:"Thank you for completing the survey."

},

fr: {

title:"Questionnaire de préparation – Formation IA HuloTech",

intro:"Ce court questionnaire (environ 5 minutes) nous aidera à adapter la formation IA à vos besoins.",

role:"Votre rôle",

sector:"Votre secteur",

aiLevel:"Quel est votre niveau de familiarité avec les outils d’IA?",

tools:"Quels outils d’IA avez-vous utilisés?",

time:"Quelles tâches vous prennent le plus de temps au travail?",

automation:"Quelle tâche aimeriez-vous automatiser avec l’IA?",

problem:"Décrivez un problème que vous aimeriez résoudre avec l’IA",

submit:"Envoyer",

success:"Merci d’avoir rempli le questionnaire."

}

}


function setLang(lang){

document.getElementById("title").innerText = translations[lang].title
document.getElementById("intro").innerText = translations[lang].intro
document.getElementById("roleLabel").innerText = translations[lang].role
document.getElementById("sectorLabel").innerText = translations[lang].sector
document.getElementById("aiLevelLabel").innerText = translations[lang].aiLevel
document.getElementById("toolsLabel").innerText = translations[lang].tools
document.getElementById("timeLabel").innerText = translations[lang].time
document.getElementById("automationLabel").innerText = translations[lang].automation
document.getElementById("problemLabel").innerText = translations[lang].problem
document.getElementById("submitBtn").innerText = translations[lang].submit
document.getElementById("successMessage").innerText = translations[lang].success

}

setLang('en')


document.getElementById("surveyForm").addEventListener("submit",function(e){

e.preventDefault()

document.getElementById("successMessage").style.display="block"

})

</script>

</body>

</html>
